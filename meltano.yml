send_anonymous_usage_stats: true
project_id: "tap-socrata"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-socrata"
    namespace: "tap_socrata"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: domains
      label: Domains
      description: Domain names to query (e.g., ['data.cityofchicago.org'])

    - name: dataset_ids
      label: Dataset IDs
      description: Optional list of Socrata dataset (4x4) IDs to restrict discovery to

    - name: api_key_id
      label: API Key ID
      description: The API Key ID for authentication
      sensitive: true

    - name: api_key_secret
      label: API Key Secret
      description: The API Key Secret for authentication
      sensitive: true

    - name: app_token
      label: App Token
      description: Optional Socrata App Token for higher rate limits
      sensitive: true

    - name: secret_token
      label: Secret Token
      description: Optional Socrata Secret Token paired with App Token
      sensitive: true

    - name: user_agent
      label: User-Agent
      description: Optional User-Agent string to use for requests

    settings_group_validation:
    - [domains]

    config:
      domains:
      - data.cityofnewyork.us

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
